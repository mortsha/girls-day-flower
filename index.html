<!doctype html>
<html lang="fa">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lilium</title>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        overflow: hidden;
        background: radial-gradient(circle at center, #1b0610, #020203 75%);
        font-family: Arial, sans-serif;
      }

      canvas {
        display: block;
      }

      .msg {
        position: absolute;
        color: white;
        max-width: 160px;
        padding: 9px 12px;
        border: 2px solid #ff5b6b;
        border-radius: 18px;
        background: rgba(255, 70, 90, 0.12);
        box-shadow: 0 0 22px #ff4055;
        font-size: 11px;
        font-weight: bold;
        text-align: center;
        line-height: 1.55;
        z-index: 10;
        animation: glow 1.8s infinite alternate;
      }

      @keyframes glow {
        from {
          opacity: 0.75;
          box-shadow: 0 0 8px #ff4055;
        }
        to {
          opacity: 1;
          box-shadow: 0 0 30px #ff4055;
        }
      }

      /* Random-ish positions */
      .m1 {
        top: 58%;
        left: 4%;
      }
      .m2 {
        top: 48%;
        right: 4%;
      }
      .m3 {
        top: 15%;
        right: 5%;
      }
      .m4 {
        top: 12%;
        left: 4%;
      }
      @media (max-width: 430px) {
        .msg {
          max-width: 135px;
          font-size: 9.5px;
          padding: 6px 8px;
          border-radius: 16px;
          line-height: 1.45;
        }

        .m1 {
          top: 56%;
          left: 3%;
        }
        .m2 {
          top: 40%;
          right: 3%;
        }

        .m3 {
          top: 16%;
          right: 3%;
        }
        .m4 {
          top: 10%;
          left: 3%;
        }
      }

      @media (min-width: 430px) and (max-width: 600px) {
        .msg {
          max-width: 155px;
          font-size: 10.5px;
          padding: 7px 9px;
          border-radius: 17px;
          line-height: 1.5;
        }

        .m1 {
          top: 58%;
          left: 4%;
        }
        .m2 {
          top: 30%;
          right: 4%;
        }
        .m3 {
          top: 16%;
          right: 4%;
        }
        .m4 {
          top: 10%;
          left: 4%;
        }
      }
    </style>
  </head>

  <body>
    <div class="msg m2">Happy Girls' Day!<br />Wishing you endless joy. ✨</div>
    <div class="msg m4">
      Every girl is a story<br />of strength and grace. 🌷
    </div>

    <canvas id="canvas"></canvas>
    <script>
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");

      let W, H, DPR;
      let start = performance.now();

      function resize() {
        DPR = Math.min(window.devicePixelRatio || 1, 2);
        W = window.innerWidth;
        H = window.innerHeight;

        canvas.width = W * DPR;
        canvas.height = H * DPR;
        canvas.style.width = W + "px";
        canvas.style.height = H + "px";

        ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      }
      resize();

      function getLayout() {
        const minSide = Math.min(W, H);

        if (W <= 360) {
          return {
            s: minSide / 520,
            baseY: H * 0.86,
            stemH: H * 0.46,
            sideY: H * 0.3,
            sideX: W * 0.25,
            topScale: 0.82,
            sideScale: 0.58,
            grassCount: 38,
            groundLift: 58 * (minSide / 520),
          };
        }

        if (W <= 430) {
          return {
            s: minSide / 480,
            baseY: H * 0.86,
            stemH: H * 0.5,
            sideY: H * 0.32,
            sideX: W * 0.27,
            topScale: 0.92,
            sideScale: 0.66,
            grassCount: 46,
            groundLift: 62 * (minSide / 480),
          };
        }

        if (W <= 600) {
          return {
            s: minSide / 460,
            baseY: H * 0.85,
            stemH: H * 0.52,
            sideY: H * 0.33,
            sideX: W * 0.27,
            topScale: 0.95,
            sideScale: 0.68,
            grassCount: 54,
            groundLift: 36 * (minSide / 460),
          };
        }

        return {
          s: Math.min(W / 1000, H / 850),
          baseY: H * 0.86,
          stemH: H * 0.56,
          sideY: H * 0.36,
          sideX: W * 0.18,
          topScale: 1.08,
          sideScale: 0.78,
          grassCount: 70,
          groundLift: 0,
        };
      }

      function easeOut(t) {
        return 1 - Math.pow(1 - t, 3);
      }

      function drawCurveStem(x1, y1, x2, y2, c1x, c1y, c2x, c2y, grow, width) {
        const p = grow;

        const endX = x1 + (x2 - x1) * p;
        const endY = y1 + (y2 - y1) * p;

        ctx.strokeStyle = "#74b94e";
        ctx.lineWidth = width;
        ctx.lineCap = "round";

        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.bezierCurveTo(
          x1 + (c1x - x1) * p,
          y1 + (c1y - y1) * p,
          x1 + (c2x - x1) * p,
          y1 + (c2y - y1) * p,
          endX,
          endY,
        );
        ctx.stroke();

        return { x: endX, y: endY };
      }

      function leaf(x, y, angle, size, grow, cyan = false) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle);
        ctx.scale(grow, grow);

        const g = ctx.createLinearGradient(-size, 0, size, 0);
        if (cyan) {
          g.addColorStop(0, "#04272b");
          g.addColorStop(0.5, "#19d9d2");
          g.addColorStop(1, "#b9fff7");
        } else {
          g.addColorStop(0, "#174b26");
          g.addColorStop(0.5, "#8cc96b");
          g.addColorStop(1, "#123d1e");
        }

        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.ellipse(0, 0, size * 0.22, size, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
      }

      function grass(x, y, h, angle, grow) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle);

        const g = ctx.createLinearGradient(0, 0, 0, -h);
        g.addColorStop(0, "#03191c");
        g.addColorStop(0.5, "#18d6c9");
        g.addColorStop(1, "#b9fff7");

        ctx.strokeStyle = g;
        ctx.lineWidth = Math.max(2, h * 0.035);
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(18, -h * 0.6 * grow, 4, -h * grow);
        ctx.stroke();

        ctx.restore();
      }

      function petal(cx, cy, angle, length, width, grow) {
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(angle);
        ctx.scale(grow, grow);

        const g = ctx.createLinearGradient(0, 0, 0, -length);
        g.addColorStop(0, "#fff0b5");
        g.addColorStop(0.36, "#ffffff");
        g.addColorStop(1, "#f5f5ff");

        ctx.shadowColor = "rgba(255,230,160,.8)";
        ctx.shadowBlur = 14;
        ctx.fillStyle = g;

        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.bezierCurveTo(
          -width,
          -length * 0.25,
          -width * 0.66,
          -length * 0.8,
          0,
          -length,
        );
        ctx.bezierCurveTo(
          width * 0.66,
          -length * 0.8,
          width,
          -length * 0.25,
          0,
          0,
        );
        ctx.fill();

        ctx.shadowBlur = 0;
        ctx.strokeStyle = "rgba(230,230,230,.45)";
        ctx.lineWidth = 1;
        ctx.stroke();

        ctx.restore();
      }

      function lily(cx, cy, scale, rotate, grow) {
        const bloom = Math.max(0, (grow - 0.45) / 0.55);
        if (bloom <= 0) return;

        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(rotate);

        const aura = ctx.createRadialGradient(
          0,
          -25 * scale,
          2,
          0,
          -25 * scale,
          150 * scale,
        );
        aura.addColorStop(0, "rgba(255,230,150,.55)");
        aura.addColorStop(0.35, "rgba(255,210,90,.25)");
        aura.addColorStop(1, "rgba(255,220,120,0)");

        ctx.fillStyle = aura;
        ctx.beginPath();
        ctx.arc(0, -25 * scale, 150 * scale, 0, Math.PI * 2);
        ctx.fill();

        petal(0, 0, -Math.PI / 2, 95 * scale, 32 * scale, bloom);
        petal(0, 0, -Math.PI / 2 - 0.7, 86 * scale, 30 * scale, bloom);
        petal(0, 0, -Math.PI / 2 + 0.7, 86 * scale, 30 * scale, bloom);
        petal(0, 0, -Math.PI / 2 - 1.35, 75 * scale, 34 * scale, bloom);
        petal(0, 0, -Math.PI / 2 + 1.35, 75 * scale, 34 * scale, bloom);
        petal(0, 0, Math.PI / 2, 68 * scale, 32 * scale, bloom);

        ctx.save();
        ctx.scale(bloom, bloom);

        ctx.strokeStyle = "#e8c94f";
        ctx.lineWidth = 2.5 * scale;

        for (let i = -2; i <= 2; i++) {
          ctx.beginPath();
          ctx.moveTo(0, -4 * scale);
          ctx.lineTo(i * 8 * scale, -52 * scale);
          ctx.stroke();

          ctx.fillStyle = "#c26a20";
          ctx.beginPath();
          ctx.ellipse(
            i * 8 * scale,
            -58 * scale,
            4 * scale,
            10 * scale,
            0.3,
            0,
            Math.PI * 2,
          );
          ctx.fill();
        }

        ctx.restore();
        ctx.restore();
      }

      function sparkles(cx, cy, spreadX, spreadY, grow) {
        if (grow < 0.6) return;

        const t = Date.now() * 0.001;

        for (let i = 0; i < 90; i++) {
          const angle = i * 1.6 + t;
          const radius = 18 + (i % 18) * 8 + Math.sin(t + i) * 7;

          const x = cx + Math.cos(angle) * radius * spreadX;
          const y = cy + Math.sin(angle) * radius * spreadY;

          const alpha = 0.12 + Math.abs(Math.sin(t * 2 + i)) * 0.6;

          ctx.fillStyle =
            i % 9 === 0
              ? `rgba(50,240,255,${alpha})`
              : `rgba(255,220,120,${alpha})`;

          ctx.beginPath();
          ctx.arc(x, y, i % 7 === 0 ? 2.5 : 1.2, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function seedNoise(i) {
        return Math.abs(Math.sin(i * 12.9898) * 43758.5453) % 1;
      }

      function bottomFog(cx, rootY, s, grow) {
        const fog = ctx.createRadialGradient(
          cx,
          rootY + 22 * s,
          8,
          cx,
          rootY + 22 * s,
          340 * s,
        );
        fog.addColorStop(0, `rgba(60,255,210,${0.14 * grow})`);
        fog.addColorStop(0.55, `rgba(60,255,210,${0.06 * grow})`);
        fog.addColorStop(1, "rgba(60,255,210,0)");

        ctx.fillStyle = fog;
        ctx.fillRect(0, rootY - 105 * s, W, H);
      }

      function tinyFlower(x, y, size, grow) {
        ctx.save();
        ctx.translate(x, y);
        ctx.scale(grow, grow);

        ctx.shadowColor = "rgba(255,255,255,.7)";
        ctx.shadowBlur = 8 * size;
        ctx.fillStyle = "#ffffff";

        for (let i = 0; i < 6; i++) {
          const a = (i * Math.PI) / 3;
          ctx.beginPath();
          ctx.ellipse(
            Math.cos(a) * 5 * size,
            Math.sin(a) * 5 * size,
            2.4 * size,
            4.4 * size,
            a,
            0,
            Math.PI * 2,
          );
          ctx.fill();
        }

        ctx.shadowBlur = 0;
        ctx.fillStyle = "#ffd84a";
        ctx.beginPath();
        ctx.arc(0, 0, 2.2 * size, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
      }

      function stone(x, y, size, rot, grow) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(rot);
        ctx.scale(grow, grow);

        const g = ctx.createLinearGradient(-size, -size, size, size);
        g.addColorStop(0, "rgba(215,215,215,.45)");
        g.addColorStop(0.55, "rgba(95,95,95,.38)");
        g.addColorStop(1, "rgba(25,25,30,.45)");

        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.ellipse(0, 0, size * 1.25, size * 0.65, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
      }

      function fallenLeaf(x, y, angle, size, grow) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle);
        ctx.scale(grow, grow);

        const g = ctx.createLinearGradient(-size, 0, size, 0);
        g.addColorStop(0, "#1b5c2b");
        g.addColorStop(0.55, "#9bd071");
        g.addColorStop(1, "#12391d");

        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.ellipse(0, 0, size * 0.33, size, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
      }

      function fireflies(rootY, s, now, grow) {
        if (grow < 0.65) return;

        for (let i = 0; i < 28; i++) {
          const n1 = seedNoise(i + 7);
          const n2 = seedNoise(i + 21);
          const x =
            W * (0.04 + n1 * 0.92) + Math.sin(now * 0.0007 + i) * 10 * s;
          const y =
            rootY -
            120 * s +
            n2 * 130 * s +
            Math.sin(now * 0.0011 + i * 2) * 16 * s;
          const alpha = 0.18 + Math.abs(Math.sin(now * 0.002 + i)) * 0.7;

          ctx.shadowColor = "rgba(255,230,80,.9)";
          ctx.shadowBlur = 10 * s;
          ctx.fillStyle = `rgba(255,235,120,${alpha})`;
          ctx.beginPath();
          ctx.arc(x, y, Math.max(1.2, 2.1 * s), 0, Math.PI * 2);
          ctx.fill();
          ctx.shadowBlur = 0;
        }
      }

      function roots(rootX, rootY, s, grow) {
        const rootData = [
          [-34, 42, -8, 15, -28, 30],
          [34, 42, 8, 15, 28, 30],
          [-65, 28, -18, 8, -45, 22],
          [65, 28, 18, 8, 45, 22],
          [-12, 52, -2, 15, -9, 35],
          [12, 52, 2, 15, 9, 35],
        ];

        ctx.strokeStyle = "rgba(150,220,105,.75)";
        ctx.lineCap = "round";

        rootData.forEach((r, idx) => {
          const [ex, ey, c1x, c1y, c2x, c2y] = r;
          ctx.lineWidth = Math.max(1.1, (2.4 - idx * 0.16) * s);
          ctx.beginPath();
          ctx.moveTo(rootX, rootY);
          ctx.bezierCurveTo(
            rootX + c1x * s * grow,
            rootY + c1y * s * grow,
            rootX + c2x * s * grow,
            rootY + c2y * s * grow,
            rootX + ex * s * grow,
            rootY + ey * s * grow,
          );
          ctx.stroke();
        });
      }

      function foregroundGrassLayer(cx, groundY, s, now, grow, layout) {
        // This layer is drawn AFTER the lily, so the lower stem/root looks behind the grass.
        for (let i = 0; i < Math.floor(layout.grassCount * 0.95); i++) {
          const x = W * 0.02 + seedNoise(i + 520) * W * 0.96;
          const h = 52 * s + seedNoise(i + 530) * 78 * s;
          const wind = Math.sin(now * 0.0015 + i) * 0.09;
          grass(
            x,
            groundY - 8 * s,
            h + 18 * s,
            (seedNoise(i + 540) - 0.5) * 0.75 + wind,
            grow,
          );
        }

        for (let i = 0; i < 18; i++) {
          const x = cx - 210 * s + i * 25 * s + Math.sin(i * 1.7) * 8 * s;
          const y = groundY - 18 * s - (i % 5) * 8 * s;
          leaf(
            x,
            y,
            i % 2 ? -0.92 : 0.92,
            27 * s + (i % 3) * 4 * s,
            grow,
            true,
          );
        }

        for (let i = 0; i < 14; i++) {
          const x = W * 0.05 + seedNoise(i + 600) * W * 0.9;
          const y = groundY + 16 * s + seedNoise(i + 610) * 24 * s;
          tinyFlower(x, y, (0.5 + seedNoise(i + 620) * 0.45) * s, grow);
        }
      }

      function animate(now) {
        ctx.clearRect(0, 0, W, H);

        const grow = easeOut(Math.min((now - start) / 4300, 1));
        const layout = getLayout();

        const cx = W / 2;
        const rootX = cx;
        const s = layout.s;
        const rootY = layout.baseY + 20 * s;
        const groundY = rootY - (layout.groundLift || 0);

        const topY = rootY - layout.stemH;
        const leftEndX = rootX - layout.sideX;
        const rightEndX = rootX + layout.sideX;
        const sideY = rootY - layout.sideY;

        sparkles(cx, topY + 40 * s, 1.15, 0.9, grow);
        bottomFog(cx, groundY, s, grow);
        fireflies(groundY, s, now, grow);

        // fuller bottom grass, moved higher
        for (let i = 0; i < layout.grassCount; i++) {
          const gap = (W * 0.92) / layout.grassCount;
          const x = W * 0.04 + i * gap + Math.sin(i * 2.4) * 6 * s;
          const h = 58 * s + (i % 7) * 14 * s;
          const wind = Math.sin(now * 0.0014 + i) * 0.08;
          grass(x, groundY + 5 * s, h, (i % 2 ? -0.28 : 0.28) + wind, grow);
        }

        // second grass layer to make the bottom richer
        for (let i = 0; i < Math.floor(layout.grassCount * 0.7); i++) {
          const x = W * 0.03 + seedNoise(i + 80) * W * 0.94;
          const h = 34 * s + seedNoise(i + 90) * 45 * s;
          const wind = Math.sin(now * 0.0012 + i) * 0.06;
          grass(
            x,
            groundY + 24 * s,
            h,
            (seedNoise(i + 100) - 0.5) * 0.65 + wind,
            grow,
          );
        }

        // bottom cyan leaves
        for (let i = 0; i < 26; i++) {
          const x = cx - 245 * s + i * 20 * s + Math.sin(i) * 9 * s;
          const y = groundY - 8 * s - (i % 6) * 9 * s;
          leaf(
            x,
            y,
            i % 2 ? -0.95 : 0.95,
            31 * s + (i % 4) * 3 * s,
            grow,
            true,
          );
        }

        // tiny flowers, stones, and fallen leaves
        for (let i = 0; i < 26; i++) {
          const x = W * 0.06 + seedNoise(i + 140) * W * 0.88;
          const y = groundY + 8 * s + seedNoise(i + 150) * 38 * s;
          tinyFlower(x, y, (0.55 + seedNoise(i + 160) * 0.55) * s, grow);
        }

        for (let i = 0; i < 15; i++) {
          const x = W * 0.07 + seedNoise(i + 200) * W * 0.86;
          const y = groundY + 24 * s + seedNoise(i + 210) * 26 * s;
          stone(
            x,
            y,
            (4 + seedNoise(i + 220) * 7) * s,
            seedNoise(i + 230) * Math.PI,
            grow,
          );
        }

        for (let i = 0; i < 10; i++) {
          const x = W * 0.09 + seedNoise(i + 260) * W * 0.82;
          const y = groundY + 18 * s + seedNoise(i + 270) * 28 * s;
          fallenLeaf(
            x,
            y,
            seedNoise(i + 280) * Math.PI,
            (8 + seedNoise(i + 290) * 7) * s,
            grow,
          );
        }

        // roots hidden so the flower looks like it grows from behind the grass
        // roots(rootX, rootY, s, grow);

        // main one stem
        const top = drawCurveStem(
          rootX,
          rootY,
          rootX,
          topY,
          rootX - 8 * s,
          rootY - layout.stemH * 0.35,
          rootX + 10 * s,
          rootY - layout.stemH * 0.72,
          grow,
          Math.max(4, 6 * s),
        );

        // branch start points from main stem
        const branchStartLeftY = rootY - layout.stemH * 0.46 * grow;
        const branchStartRightY = rootY - layout.stemH * 0.44 * grow;

        const leftHead = drawCurveStem(
          rootX,
          branchStartLeftY,
          leftEndX,
          sideY,
          rootX - layout.sideX * 0.35,
          branchStartLeftY - 25 * s,
          rootX - layout.sideX * 0.75,
          sideY + 45 * s,
          grow,
          Math.max(3, 4.2 * s),
        );

        const rightHead = drawCurveStem(
          rootX,
          branchStartRightY,
          rightEndX,
          sideY + 5 * s,
          rootX + layout.sideX * 0.35,
          branchStartRightY - 25 * s,
          rootX + layout.sideX * 0.75,
          sideY + 45 * s,
          grow,
          Math.max(3, 4.2 * s),
        );

        // leaves on main stem
        leaf(
          rootX - 22 * s,
          rootY - layout.stemH * 0.3 * grow,
          -0.75,
          42 * s,
          grow,
        );
        leaf(
          rootX + 22 * s,
          rootY - layout.stemH * 0.4 * grow,
          0.75,
          43 * s,
          grow,
        );
        leaf(
          rootX - 18 * s,
          rootY - layout.stemH * 0.58 * grow,
          -0.65,
          36 * s,
          grow,
        );
        leaf(
          rootX + 18 * s,
          rootY - layout.stemH * 0.68 * grow,
          0.65,
          36 * s,
          grow,
        );

        // leaves on side branches
        leaf(rootX - layout.sideX * 0.45, sideY + 42 * s, -1.05, 31 * s, grow);
        leaf(rootX + layout.sideX * 0.45, sideY + 42 * s, 1.05, 31 * s, grow);

        // flowers
        lily(top.x, top.y, layout.topScale * s, 0, grow);
        lily(leftHead.x, leftHead.y, layout.sideScale * s, -0.45, grow);
        lily(rightHead.x, rightHead.y, layout.sideScale * s, 0.45, grow);

        // foreground grass goes last, so the bottom of the lily sits behind the grass
        foregroundGrassLayer(cx, groundY, s, now, grow, layout);

        requestAnimationFrame(animate);
      }

      requestAnimationFrame(animate);
      addEventListener("resize", resize);
    </script>
  </body>
</html>
